server {
    listen 80;
    server_name _;

    gzip_static on;

    root /usr/share/nginx/html;

    location = /short-sales {
        return 301 /short-sales/;
    }

    location ^~ /short-sales/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|woff2?|ttf|eot|ico|png|svg|jpg|jpeg|gif|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
